<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Colors | Asistente de Viaje Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand-blue: #04263a; --accent: #bd5307; --pearl-bg: #f7f5f0; }
        body { background-color: var(--pearl-bg); color: var(--brand-blue); font-family: 'Montserrat', sans-serif; }
        
        #assistant-section { max-width: 900px; margin: 40px auto; padding: 30px; background: #fff; border-radius: 12px; }
        .day-block { background: #fff; padding: 20px; margin-top: 15px; border-left: 4px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-generate { background: var(--brand-blue); color: #fff; padding: 15px 30px; border-radius: 30px; border: none; cursor: pointer; width: 100%; font-weight: 700; }
        .map-link { color: var(--accent); font-weight: 600; display: inline-block; margin-top: 8px; text-decoration: none; }
    </style>
</head>
<body>

    <div id="main-site-wrapper">
        <section id="assistant-section" style="display: block;">
            <h2 style="font-family: 'Cinzel'; margin-bottom: 20px;">Tu Asistente Vacacional Premium</h2>
            <div class="form-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                <div><label>Noches</label><select id="nights"></select></div>
                <div><label>Personas</label><select id="people"></select></div>
                <div><label>Presupuesto (MXN)</label><select id="budget"></select></div>
                <div><label>Destino</label><select id="dest"><option value="Cancun">Cancún</option><option value="Playa del Carmen">Playa del Carmen</option><option value="Tulum">Tulum</option></select></div>
            </div>
            <button class="btn-generate" onclick="generateItinerary()">Calcular e Planificar mi Itinerario</button>
            <div id="itinerary-result" style="margin-top: 30px;"></div>
        </section>
    </div>

    <script>
        const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9f5_81pPWsXVaJ5uKaifOyjpmSprGKAzEkGh7qMSd5R83cV8UCJeqldoZIb5l3sN8kDEbFoC2NY0s/pub?gid=451869619&single=true&output=tsv';
        let fullData = [];

        // Base de Datos Real de Venues categorizados por nivel de costo
        const venues = {
            "Cancun": {
                luxury: [{name: "Ilios Greek Estiatorio", q: "Ilios+Greek+Estiatorio+Cancun"}, {name: "Harry's Steakhouse", q: "Harrys+Steakhouse+Cancun"}],
                standard: [{name: "El Fish Fritanga", q: "El+Fish+Fritanga+Cancun"}, {name: "La Habichuela", q: "La+Habichuela+Cancun"}]
            },
            "Playa del Carmen": {
                luxury: [{name: "Alux Restaurant", q: "Alux+Restaurant+Playa+del+Carmen"}, {name: "Catch", q: "Catch+Playa+del+Carmen"}],
                standard: [{name: "La Cueva del Chango", q: "La+Cueva+del+Chango+Playa+del+Carmen"}, {name: "El Fogón", q: "El+Fogon+Playa+del+Carmen"}]
            },
            "Tulum": {
                luxury: [{name: "Rosa Negra", q: "Rosa+Negra+Tulum"}, {name: "Gitano", q: "Gitano+Tulum"}],
                standard: [{name: "Taquería Honorio", q: "Taqueria+Honorio+Tulum"}, {name: "Burrito Amor", q: "Burrito+Amor+Tulum"}]
            }
        };

        async function init() {
            const response = await fetch(TSV_URL);
            const text = await response.text();
            const rows = text.split('\n').map(r => r.split('\t'));
            const headers = rows[0].map(h => h.trim());
            fullData = rows.slice(1).map(row => {
                let item = {}; headers.forEach((h, i) => { item[h] = row[i]?.trim(); }); return item;
            });
        }

        function generateItinerary() {
            const maxBudget = parseInt(document.getElementById('budget').value);
            const nights = parseInt(document.getElementById('nights').value);
            const dest = document.getElementById('dest').value;
            const res = document.getElementById('itinerary-result');
            
            // 1. Filtrar Actividades (Yate + Tours)
            const yate = fullData.find(i => i['Tipo']?.toLowerCase().includes('yate'));
            const tours = fullData.filter(i => i['Tipo']?.toLowerCase().includes('tour'));
            
            let totalActivityCost = 0;
            let selectedActivities = [yate]; // Incluimos 1 Yate
            totalActivityCost += parseInt((yate?.['Precio'] || '5000').replace(/\D/g,''));
            
            // Agregar algunos tours hasta llenar el itinerario
            tours.forEach(t => {
                let cost = parseInt((t['Precio'] || '1000').replace(/\D/g,''));
                if (totalActivityCost + cost < maxBudget * 0.7) { // Guardamos margen para comida
                    selectedActivities.push(t);
                    totalActivityCost += cost;
                }
            });

            // 2. Calcular presupuesto restante
            let remainingBudget = maxBudget - totalActivityCost;
            let tier = (remainingBudget / nights > 1500) ? 'luxury' : 'standard';

            let html = `<h3>Itinerario para ${nights} noches en ${dest} (Presupuesto restante: $${remainingBudget.toLocaleString()} MXN)</h3>`;
            
            for (let i = 1; i <= nights; i++) {
                if (i % 2 !== 0) {
                    const act = selectedActivities[(i-1) % selectedActivities.length];
                    html += `<div class="day-block"><h4>Día ${i}: Actividad</h4><p>${act ? act['Nombre'] : "Tour Privado"}</p></div>`;
                } else {
                    const v = venues[dest][tier][(i/2) % venues[dest][tier].length];
                    html += `<div class="day-block"><h4>Día ${i}: Descanso</h4><p>Recomendación (${tier.toUpperCase()}): ${v.name}</p>
                             <a href="https://www.google.com/maps/search/?api=1&query=${v.q}" target="_blank" class="map-link">📍 Ver ubicación en Google Maps</a></div>`;
                }
            }
            res.innerHTML = html;
        }

        // Población de selects... (omitido para brevedad, igual que antes)
        init();
    </script>
</body>
</html>
