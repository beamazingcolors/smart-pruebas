<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Colors | Elite Ocean Journeys</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/beamazingcolors/amazingcolors/main/HRR.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #000000; 
            --brand-blue: #04263a; 
            --accent: #bd5307;  
            --light: #0cb5d6;   
            --white: #ffffff;
            --pearl-bg: #f7f5f0;   
            --gradient: linear-gradient(135deg, #f5841a 0%, #ffb347 100%);
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--primary-dark); color: var(--white); font-family: 'Montserrat', sans-serif; line-height: 1.6; overflow-x: hidden; }

        /* LIENZO DE ORBES GLOBAL */
        #smokeCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 99999;
            pointer-events: none; 
        }

        /* 1. PANTALLA DE INICIO CINEMATOGRÁFICA */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 9998;
            overflow: hidden;
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 1.2s ease;
            touch-action: none; 
        }

        #welcome-screen.dismissed {
            transform: translateY(-100vh);
            opacity: 0;
            pointer-events: none;
        }

        .vignette-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 20%, rgba(0, 0, 0, 0.4) 60%, #000000 95%);
            z-index: 2;
            pointer-events: none;
        }

        .welcome-content {
            position: relative;
            z-index: 5;
            max-width: 950px;
            padding: 0 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .welcome-content img {
            width: 260px;
            max-width: 75vw;
            margin-bottom: 35px;
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.6));
        }

        .welcome-content h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.2rem, 7vw, 4rem);
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 15px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .welcome-subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            font-weight: 400;
            color: #b3bdc7;
            letter-spacing: 1px;
            margin-bottom: 50px;
            max-width: 700px;
        }

        .welcome-btn {
            background-color: var(--accent);
            color: var(--white);
            border: 1px solid #ff9132;
            padding: 18px 50px;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            z-index: 100000;
            transition: all 0.4s ease;
            font-family: 'Montserrat', sans-serif;
            box-shadow: 0 0 25px rgba(12, 181, 214, 0.85);
        }

        /* 2. INTERFAZ PRINCIPAL (CATÁLOGO ESTILO PERLADO) */
        #main-site-wrapper {
            opacity: 0;
            background-color: var(--pearl-bg);
            color: var(--brand-blue);
            transition: opacity 1s ease 0.5s;
            min-height: 100vh;
        }
        
        #main-site-wrapper.visible {
            opacity: 1;
        }

        .site-brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 15px 25px 15px;
            cursor: pointer;
            background: var(--pearl-bg);
            width: 100%; 
            text-align: center;
        }

        .site-brand-header span {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.5rem, 5.5vw, 2.4rem); 
            letter-spacing: 6px;
            margin-right: -6px; 
            text-transform: uppercase;
            color: var(--brand-blue);
            font-weight: 700;
            display: inline-block;
            width: 100%;
            transition: color 0.3s ease;
        }

        .site-brand-header:hover span { color: #f5841a; }

        .nav-bar { 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            background: rgba(247, 245, 240, 0.96); 
            backdrop-filter: blur(10px); 
            padding: 20px 0; 
            border-bottom: 1px solid rgba(4, 38, 58, 0.08); 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            flex-wrap: wrap;
        }
        
        .nav-btn { 
            background: none; 
            border: none; 
            color: var(--brand-blue); 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            cursor: pointer; 
            opacity: 0.6; 
            font-weight: 600;
            padding: 5px 10px;
            transition: all 0.3s ease;
        }
        
        .nav-btn.active { opacity: 1; color: #f5841a; border-bottom: 2px solid #f5841a; }

        .assistant-trigger-btn {
            background: var(--brand-blue);
            color: var(--white);
            border-radius: 20px;
            padding: 6px 18px;
            opacity: 1;
            box-shadow: 0 4px 10px rgba(4, 38, 58, 0.2);
            border: 1px solid transparent;
        }
        .assistant-trigger-btn:hover {
            background: #f5841a;
            color: var(--white);
            border-color: #f5841a;
            transform: translateY(-2px);
        }

        #catalog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 40px 5%; max-width: 1600px; margin: 0 auto; }
        
        .card { 
            background: #ffffff; 
            border: 1px solid rgba(4, 38, 58, 0.06); 
            border-radius: 8px; 
            overflow: hidden; 
            transition: 0.4s; 
            opacity: 0; 
            transform: translateY(20px); 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(4, 38, 58, 0.03);
        }
        
        .card.visible { opacity: 1; transform: translateY(0); }
        .card:hover { border-color: #f5841a; transform: scale(1.02); }
        
        .img-container { width: 100%; height: 280px; position: relative; background: var(--brand-blue); overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; display: block; position: relative; z-index: 1; }

        .card-info { padding: 20px; }
        .card-title { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--brand-blue); font-weight: 600; }
        .card-price { color: #f5841a; font-weight: 600; font-size: 1rem; }

        /* SECCIÓN ASISTENTE VACACIONAL */
        #assistant-section {
            max-width: 1100px;
            margin: 30px auto;
            padding: 40px 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(4, 38, 58, 0.05);
            display: none;
            color: var(--brand-blue);
        }

        .assistant-title {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 30px;
            color: var(--brand-blue);
            font-weight: 700;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #556b78;
        }

        .form-group select {
            padding: 12px;
            border: 1px solid rgba(4, 38, 58, 0.15);
            border-radius: 6px;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--pearl-bg);
            color: var(--brand-blue);
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        .form-group select:focus {
            border-color: #f5841a;
        }

        .btn-generate {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 30px auto 0 auto;
            background: var(--gradient);
            color: var(--white);
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(245, 132, 26, 0.3);
            text-align: center;
        }
        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 132, 26, 0.4);
        }

        /* DISEÑO DEL ITINERARIO RESULTANTE */
        .itinerary-container {
            margin-top: 40px;
            border-top: 1px solid rgba(4, 38, 58, 0.1);
            padding-top: 30px;
        }

        .itinerary-header {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            color: var(--brand-blue);
            margin-bottom: 20px;
            text-align: center;
        }

        .day-block {
            background: var(--pearl-bg);
            border-left: 4px solid #f5841a;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
        }

        .day-title {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--brand-blue);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .day-type-badge {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            background: var(--brand-blue);
            color: var(--white);
            padding: 3px 10px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .day-type-badge.rest {
            background: #0cb5d6;
        }

        .recommendation-box {
            background: #ffffff;
            border: 1px solid rgba(4, 38, 58, 0.08);
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
        }

        .recommendation-box h4 {
            font-size: 1rem;
            color: #bd5307;
            margin-bottom: 5px;
        }

        .google-rating {
            color: #ffb347;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: inline-block;
        }

        .map-link-btn {
            display: inline-flex;
            align-items: center;
            font-size: 0.8rem;
            color: var(--brand-blue);
            text-decoration: none;
            font-weight: 600;
            margin-top: 8px;
            border: 1px solid var(--brand-blue);
            padding: 4px 10px;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .map-link-btn:hover {
            background: var(--brand-blue);
            color: var(--white);
        }

        /* SECCIÓN FEEDBACK Y RECOMENDACIONES EXTRA */
        .feedback-container {
            background: #fff3e6;
            border: 1px dashed #f5841a;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
            text-align: center;
        }

        .feedback-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn-feedback {
            background: #ffffff;
            border: 1px solid #f5841a;
            color: #bd5307;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn-feedback:hover, .btn-feedback.active {
            background: #f5841a;
            color: #ffffff;
        }

        /* MODAL GLOBAL */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 38, 58, 0.4); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 15px; }
        .modal-content { background: var(--white); width: 100%; max-width: 1000px; max-height: 90vh; overflow-y: auto; border-radius: 12px; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 2.2rem; color: var(--brand-blue); cursor: pointer; z-index: 10; }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; }
        .modal-gallery { background: var(--brand-blue); min-height: 350px; overflow: hidden; }
        .modal-details { padding: 40px; color: #333; }
        .modal-title { font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--brand-blue); font-weight: 700; }
        .btn-wa { display: block; text-align: center; background: var(--gradient); color: var(--white); text-decoration: none; padding: 18px; font-weight: 700; text-transform: uppercase; margin-top: 30px; border-radius: 6px; }

        #lightbox-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 3000; cursor: zoom-out; }
        #lightbox-overlay img { max-width: 95%; max-height: 95vh; object-fit: contain; }
        
        @media (max-width: 800px) { .modal-grid { grid-template-columns: 1fr; } .modal-details { padding: 30px; } .img-container { height: 240px; } }
    </style>
</head>
<body>

    <canvas id="smokeCanvas"></canvas>

    <div id="welcome-screen">
        <div class="vignette-overlay"></div>
        <div class="welcome-content">
            <img id="main-brand-logo" src="https://raw.githubusercontent.com/beamazingcolors/amazingcolors/main/HRR.png" alt="Amazing Colors Logo">
            <h1>Bienvenido a<br>Amazing Colors</h1>
            <p class="welcome-subtitle">Explora nuestras experiencias exclusivas y comienza tu viaje inolvidable.</p>
            <button class="welcome-btn" onclick="startExperience()">Comencemos la experiencia</button>
        </div>
    </div>

    <div id="main-site-wrapper">
        <div class="site-brand-header" onclick="backToWelcome()">
            <span>Amazing Colors</span>
        </div>

        <nav class="nav-bar">
            <button id="btnTour" class="nav-btn active" onclick="filter('tour')">Experiencias</button>
            <button id="btnYate" class="nav-btn" onclick="filter('yate')">Nuestra Flota</button>
            <button id="btnAssistant" class="nav-btn assistant-trigger-btn" onclick="toggleAssistant()">Asistente Vacacional</button>
        </nav>

        <!-- SECCIÓN DEL ASISTENTE VIRTUAL DE VACACIONES -->
        <section id="assistant-section">
            <h2 class="assistant-title">Asistente Vacacional Premium</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="selectNights">Número de noches</label>
                    <select id="selectNights">
                        <option value="3">3 Noches</option>
                        <option value="5">5 Noches</option>
                        <option value="7" selected>7 Noches</option>
                        <option value="10">10 Noches</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="selectPeople">Número de personas</label>
                    <select id="selectPeople">
                        <option value="1">1 Persona</option>
                        <option value="2" selected>2 Personas</option>
                        <option value="4">4 Personas</option>
                        <option value="6">6+ Personas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="selectBudget">Presupuesto Estimado</label>
                    <select id="selectBudget">
                        <option value="eco">Económico (Acceso Esencial)</option>
                        <option value="standard" selected>Moderado (Experiencia Balanceada)</option>
                        <option value="luxury">VIP Luxury Premium</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="selectDestiny">Destino Preferido</label>
                    <select id="selectDestiny">
                        <option value="Cancun" selected>Cancún</option>
                        <option value="Playa del Carmen">Playa del Carmen</option>
                        <option value="Tulum">Tulum</option>
                    </select>
                </div>
            </div>

            <button class="btn-generate" onclick="generateItinerary()">Planificar mis Vacaciones</button>

            <!-- Contenedor dinámico del itinerario -->
            <div id="itinerary-result"></div>
        </section>

        <main id="catalog-grid"></main>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modal-body" class="modal-grid"></div>
        </div>
    </div>

    <div id="lightbox-overlay" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Vista Completa">
    </div>

    <script>
        const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9f5_81pPWsXVaJ5uKaifOyjpmSprGKAzEkGh7qMSd5R83cV8UCJeqldoZIb5l3sN8kDEbFoC2NY0s/pub?gid=451869619&single=true&output=tsv';
        const GITHUB_RAW = 'https://raw.githubusercontent.com/beamazingcolors/amazingcolors/main/';

        let fullData = [];
        let isMainSiteActive = false;
        let preferenceActivity = 'todas'; // terrestre o maritima

        // Base de Datos Estática de Google Ratings (Top Recomendados Reales)
        const googleVenues = {
            "Cancun": {
                "restaurants": [
                    { name: "Porfirio's Cancún", rating: "4.8 ★", desc: "Comida contemporánea mexicana de alta gama con espectaculares vistas a la laguna Nichupté.", map: "https://www.google.com/maps/search/?api=1&query=Porfirios+Cancun" },
                    { name: "Nicoletta Handcrafted Italian", rating: "4.7 ★", desc: "Cocina italiana premium con toques vanguardistas en plena Zona Hotelera.", map: "https://www.google.com/maps/search/?api=1&query=Nicoletta+Cancun" }
                ],
                "cafes": [
                    { name: "Café de Organico & Bistro", rating: "4.6 ★", desc: "Exquisitos desayunos artesanales, panadería hecha en casa y café orgánico selecto.", map: "https://www.google.com/maps/search/?api=1&query=Cafe+Organico+Cancun" },
                    { name: "Ah Cacao Chocolate", rating: "4.5 ★", desc: "Famoso por su auténtico café mexicano y repostería artesanal a base de cacao puro.", map: "https://www.google.com/maps/search/?api=1&query=Ah+Cacao+Cancun" }
                ]
            },
            "Playa del Carmen": {
                "restaurants": [
                    { name: "La Cueva del Chango", rating: "4.7 ★", desc: "Cocina natural mexicana insertada en un entorno natural selvático único con estanques.", map: "https://www.google.com/maps/search/?api=1&query=La+Cueva+del+Chango+Playa+del+Carmen" },
                    { name: "La Perla Pixan Cuisine & Mezcalería", rating: "4.6 ★", desc: "Sabores tradicionales prehispánicos y coctelería de autor premium con mezcal.", map: "https://www.google.com/maps/search/?api=1&query=La+Perla+Pixan+Playa+del+Carmen" }
                ],
                "cafes": [
                    { name: "Chez Céline", rating: "4.8 ★", desc: "Panadería y cafetería artesanal francesa de moda en la afamada Quinta Avenida.", map: "https://www.google.com/maps/search/?api=1&query=Chez+Celine+Playa+del+Carmen" },
                    { name: "Choux Choux Cafe", rating: "4.7 ★", desc: "Ambiente ecléctico y artístico ideal para café de especialidad y platillos veganos.", map: "https://www.google.com/maps/search/?api=1&query=Choux+Choux+Cafe+Playa+del+Carmen" }
                ]
            },
            "Tulum": {
                "restaurants": [
                    { name: "Taquería Honorio", rating: "4.8 ★", desc: "Los mejores y más emblemáticos tacos tradicionales de cochinita pibil y lechón en Tulum.", map: "https://www.google.com/maps/search/?api=1&query=Taqueria+Honorio+Tulum" },
                    { name: "Ilios Greek Estiatorio", rating: "4.7 ★", desc: "Cocina mediterránea de alto nivel en una arquitectura espectacular integrada a la jungla.", map: "https://www.google.com/maps/search/?api=1&query=Ilios+Tulum" }
                ],
                "cafes": [
                    { name: "Botanica Garden Cafe", rating: "4.8 ★", desc: "Un oasis escondido en el pueblo perfecto para brunch saludable y granos de café de autor.", map: "https://www.google.com/maps/search/?api=1&query=Botanica+Garden+Cafe+Tulum" },
                    { name: "Matcha Mama", rating: "4.6 ★", desc: "Lugar icónico de Tulum conocido por sus bowls de acai, smoothies y columpios tropicales.", map: "https://www.google.com/maps/search/?api=1&query=Matcha+Mama+Tulum" }
                ]
            }
        };

        function startExperience() {
            document.getElementById('welcome-screen').classList.add('dismissed');
            document.getElementById('main-site-wrapper').classList.add('visible');
            isMainSiteActive = true;
        }

        function backToWelcome() {
            document.getElementById('welcome-screen').classList.remove('dismissed');
            document.getElementById('main-site-wrapper').classList.remove('visible');
            isMainSiteActive = false;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleAssistant() {
            const sect = document.getElementById('assistant-section');
            const grid = document.getElementById('catalog-grid');
            const btns = document.querySelectorAll('.nav-btn');

            if (sect.style.display === 'block') {
                sect.style.display = 'none';
                grid.style.display = 'grid';
                document.getElementById('btnTour').classList.add('active');
                document.getElementById('btnAssistant').classList.remove('active');
                filter('tour');
            } else {
                sect.style.display = 'block';
                grid.style.display = 'none';
                btns.forEach(b => b.classList.remove('active'));
                document.getElementById('btnAssistant').classList.add('active');
                sect.scrollIntoView({ behavior: 'smooth' });
            }
        }

        /* ITINERARY ENGINE LOGIC */
        function setPreference(type) {
            preferenceActivity = type;
            document.querySelectorAll('.btn-feedback').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            generateItinerary(); // Regenerar con el nuevo filtro
        }

        function generateItinerary() {
            const nights = parseInt(document.getElementById('selectNights').value);
            const destination = document.getElementById('selectDestiny').value;
            const budget = document.getElementById('selectBudget').value;
            const container = document.getElementById('itinerary-result');
            
            let html = `
                <div class="itinerary-container">
                    <h3 class="itinerary-header">Tu Itinerario Personalizado en ${destination}</h3>
            `;

            // Filtrar experiencias del Google Sheet que coincidan con la preferencia de actividad
            let matchedExperiences = fullData.filter(item => {
                let desc = (getCleanValue(item, ['Descriptivo', 'Detalles']) + ' ' + getCleanValue(item, ['Nombre', 'NOMBRE'])).toLowerCase();
                if (preferenceActivity === 'terrestre') {
                    return !desc.includes('yate') && !desc.includes('navegacion') && !desc.includes('catamaran');
                } else if (preferenceActivity === 'maritima') {
                    return desc.includes('yate') || desc.includes('mar') || desc.includes('isla') || desc.includes('catamaran') || desc.includes('ocean');
                }
                return true; // todas
            });

            if (matchedExperiences.length === 0) matchedExperiences = fullData;

            const venuePool = googleVenues[destination] || googleVenues["Cancun"];

            for (let i = 1; i <= nights; i++) {
                // Alternar días de actividad y días de descanso
                if (i % 2 !== 0) {
                    // Día de Actividad / Aventura
                    let exp = matchedExperiences[(i - 1) % matchedExperiences.length];
                    let expName = exp ? getCleanValue(exp, ['Nombre', 'NOMBRE']) : "Exploración de Costas Premium";
                    let expPrice = exp ? (getCleanValue(exp, ['Precio', 'PRECIO']) || 'Incluido en paquete') : 'Consultar precio';
                    
                    html += `
                        <div class="day-block">
                            <div class="day-title">
                                <span>Día ${i}: Experiencia Amazing Colors</span>
                                <span class="day-type-badge">Aventura</span>
                            </div>
                            <p><strong>Actividad recomendada:</strong> ${expName}</p>
                            <p style="font-size:0.85rem; color:#f5841a; margin-top:5px;">Valor aproximado: ${expPrice}</p>
                        </div>
                    `;
                } else {
                    // Día de Descanso y Sabores Locales (Google Top Rated)
                    let restIndex = (i / 2 - 1) % venuePool.restaurants.length;
                    let cafeIndex = (i / 2 - 1) % venuePool.cafes.length;
                    
                    let rest = venuePool.restaurants[restIndex];
                    let cafe = venuePool.cafes[cafeIndex];

                    html += `
                        <div class="day-block">
                            <div class="day-title">
                                <span>Día ${i}: Descanso & Gastronomía Local</span>
                                <span class="day-type-badge rest">Relajación</span>
                            </div>
                            <p>Disfruta de la atmósfera de tu resort y relájate en las playas caribeñas. Para este día de descanso, te sugerimos los lugares con mejores reseñas de Google:</p>
                            
                            <div class="recommendation-box">
                                <h4>Cafetería Recomendada para la Mañana/Tarde:</h4>
                                <p><strong>${cafe.name}</strong> <span class="google-rating">${cafe.rating}</span></p>
                                <p style="font-size:0.85rem; color:#555;">${cafe.desc}</p>
                                <a href="${cafe.map}" target="_blank" class="map-link-btn">📍 Ver ubicación en Google Maps</a>
                            </div>

                            <div class="recommendation-box">
                                <h4>Restaurante Recomendado para la Cena:</h4>
                                <p><strong>${rest.name}</strong> <span class="google-rating">${rest.rating}</span></p>
                                <p style="font-size:0.85rem; color:#555;">${rest.desc}</p>
                                <a href="${rest.map}" target="_blank" class="map-link-btn">📍 Ver ubicación en Google Maps</a>
                            </div>
                        </div>
                    `;
                }
            }

            // Agregar sección de feedback si no le convencen las actividades
            html += `
                <div class="feedback-container">
                    <p style="font-weight: 600; color: var(--brand-blue);">¿Te gustaría ajustar tu itinerario con otro tipo de experiencias?</p>
                    <div class="feedback-buttons">
                        <button class="btn-feedback ${preferenceActivity==='todas'?'active':''}" onclick="setPreference('todas')">Todas las opciones</button>
                        <button class="btn-feedback ${preferenceActivity==='terrestre'?'active':''}" onclick="setPreference('terrestre')">Prefiero actividades Terrestres</button>
                        <button class="btn-feedback ${preferenceActivity==='maritima'?'active':''}" onclick="setPreference('maritima')">Prefiero actividades Marítimas</button>
                    </div>
                </div>
            `;

            html += `</div>`;
            container.innerHTML = html;
            container.scrollIntoView({ behavior: 'smooth' });
        }

        /* MOTOR DE RENDIMIENTO DE HUMO: ESTILO ORBES EVAPORÁNDOSE */
        const canvas = document.getElementById('smokeCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const BRAND_COLORS = ['4, 38, 58', '12, 181, 214', '245, 132, 26', '189, 21, 124'];

        class SmokeParticle {
            constructor(isFromMouse = false, mouseX = 0, mouseY = 0) {
                this.isMouse = isFromMouse;
                if (this.isMouse) {
                    this.x = mouseX + (Math.random() - 0.5) * 6;  
                    this.y = mouseY + (Math.random() - 0.5) * 6;
                    this.size = Math.random() * 5 + 3;          
                    this.growth = -(Math.random() * 0.05 + 0.03); 
                    this.speedY = -(Math.random() * 1.6 + 1.0);   
                    this.speedX = (Math.random() - 0.5) * 1.5;   
                    this.alpha = 0.9;                               
                    this.decay = Math.random() * 0.008 + 0.006;   
                    this.hue = Math.floor(Math.random() * 360);
                    this.colorFormat = 'hsl';
                } else {
                    this.resetAmbient();
                    this.y = Math.random() * canvas.height;
                }
            }

            resetAmbient() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 80;
                this.size = Math.random() * 160 + 90;
                this.growth = 0;
                this.speedY = -(Math.random() * 2.8 + 1.8);
                this.speedX = Math.sin(Math.random() * 2) * 1.6;
                this.alpha = 0;
                this.maxAlpha = Math.random() * 0.14 + 0.05;
                this.decay = 0;
                this.colorFormat = 'rgb';
                this.color = BRAND_COLORS[Math.floor(Math.random() * BRAND_COLORS.length)];
            }

            update() {
                if (this.isMouse) {
                    this.x += this.speedX; 
                    this.y += this.speedY; 
                    this.size += this.growth; 
                    this.alpha -= this.decay;
                    if (this.size < 0.1) this.size = 0.1;
                } else {
                    this.y += this.speedY; this.x += this.speedX + Math.sin(this.y / 25) * 0.8; 
                    if (this.y < canvas.height * 0.4) { this.alpha -= 0.006; } else if (this.alpha < this.maxAlpha) { this.alpha += 0.009; }
                }
            }

            draw() {
                if (this.alpha <= 0 || this.size <= 0.1) return;
                ctx.save();
                ctx.globalCompositeOperation = 'source-over'; 
                const gradient = ctx.createRadialGradient(this.x, this.y, 0.5, this.x, this.y, this.size);
                let colorBase = this.colorFormat === 'hsl' ? `hsla(${this.hue}, 95%, 55%, ` : `rgba(${this.color}, `;
                
                gradient.addColorStop(0, colorBase + `${this.alpha})`);
                gradient.addColorStop(0.4, colorBase + `${this.alpha * 0.5})`);
                gradient.addColorStop(1, colorBase + '0)');
                
                ctx.fillStyle = gradient; 
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
                ctx.fill(); 
                ctx.restore();
            }
        }

        for (let i = 0; i < 40; i++) { particles.push(new SmokeParticle(false)); }
        
        window.addEventListener('mousemove', (e) => {
            for (let i = 0; i < 2; i++) { particles.push(new SmokeParticle(true, e.clientX, e.clientY)); }
        });
        
        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            for (let i = 0; i < 2; i++) { particles.push(new SmokeParticle(true, touch.clientX, touch.clientY)); }
        }, { passive: true });

        function animateSmoke() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (!particles[i].isMouse && isMainSiteActive) { particles[i].alpha = 0; }
                particles[i].draw();
                if (particles[i].isMouse) { 
                    if (particles[i].alpha <= 0 || particles[i].size <= 0.1) { particles.splice(i, 1); } 
                } 
                else { 
                    if (particles[i].y + particles[i].size < 0 || particles[i].alpha <= 0) { particles[i].resetAmbient(); } 
                }
            }
            requestAnimationFrame(animateSmoke);
        }
        animateSmoke();

        /* PARSEO DATOS GOOGLE SHEETS */
        function getCleanValue(item, possibleHeaders) {
            if (!item) return '';
            for (let originalKey in item) {
                let normalizedKey = originalKey.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "").trim();
                for (let header of possibleHeaders) {
                    let normalizedHeader = header.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "").trim();
                    if (normalizedKey === normalizedHeader) {
                        let val = item[originalKey]?.trim();
                        if (!val || val.toLowerCase() === 'undefined' || val.toLowerCase() === 'null') return '';
                        return val;
                    }
                }
            }
            return '';
        }

        function getImgUrlByCodigo(codigoValue) {
            if (!codigoValue || codigoValue === '') return '';
            let fileName = codigoValue.trim();
            if (!fileName.toLowerCase().endsWith('.jpg') && !fileName.toLowerCase().endsWith('.jpeg') && !fileName.toLowerCase().endsWith('.png')) {
                fileName += '.jpg';
            }
            return GITHUB_RAW + encodeURIComponent(fileName);
        }

        async function init() {
            try {
                const response = await fetch(TSV_URL);
                const text = await response.text();
                const rows = text.replace(//g, '').split('
').filter(r => r.trim() !== '').map(r => r.split('	'));
                const headers = rows[0].map(h => h.trim());
                fullData = rows.slice(1).map(row => {
                    let item = {}; headers.forEach((h, i) => { item[h] = row[i]?.trim(); }); return item;
                });
                filter('tour');
            } catch (err) { console.error(err); }
        }

        function filter(category) {
            document.getElementById('assistant-section').style.display = 'none';
            document.getElementById('catalog-grid').style.display = 'grid';
            document.getElementById('btnAssistant').classList.remove('active');

            document.querySelectorAll('.nav-btn').forEach(btn => {
                if(btn.id !== 'btnAssistant') {
                    btn.classList.toggle('active', btn.innerText.toLowerCase().includes(category === 'tour' ? 'exp' : 'flota'));
                }
            });

            const grid = document.getElementById('catalog-grid'); grid.innerHTML = '';
            const filtered = fullData.filter(item => getCleanValue(item, ['TIPO', 'Tipo']).toLowerCase().includes(category.toLowerCase()));
            filtered.forEach((item, idx) => {
                const card = document.createElement('div'); card.className = 'card';
                const nombre = getCleanValue(item, ['Nombre', 'NOMBRE']);
                card.onclick = () => openModal(nombre);
                const codigo = getCleanValue(item, ['Codigo', 'Código', 'CDG']);
                const imgUrl = getImgUrlByCodigo(codigo);
                const pies = getCleanValue(item, ['Pies', 'PIES']);
                const precio = getCleanValue(item, ['Precio', 'PRECIO']) || 'Experiencias';
                
                card.innerHTML = `
                    <div class="img-container">
                        ${imgUrl ? `<img src="${imgUrl}" onerror="this.style.opacity='0';">` : ''}
                    </div>
                    <div class="card-info">
                        <span style="color:var(--light); font-size:0.75rem; font-weight:600; letter-spacing:2px; text-transform:uppercase;">${pies ? pies + ' Pies' : 'Premium'}</span>
                        <h2 class="card-title">${nombre}</h2>
                        <p class="card-price">${precio}</p>
                    </div>
                `;
                grid.appendChild(card); setTimeout(() => card.classList.add('visible'), idx * 80);
            });
        }

        function openModal(nombreBusqueda) {
            const item = fullData.find(i => getCleanValue(i, ['Nombre', 'NOMBRE']) === nombreBusqueda);
            const body = document.getElementById('modal-body');
            const nombre = getCleanValue(item, ['Nombre', 'NOMBRE']);
            const precio = getCleanValue(item, ['Precio', 'PRECIO']) || 'Experiencias';
            const desc = getCleanValue(item, ['Descriptivo', 'Detalles']) || 'Ficha técnica premium disponible.';
            const codigo = getCleanValue(item, ['Codigo', 'Código', 'CDG']);
            const imgUrl = getImgUrlByCodigo(codigo);
            
            body.innerHTML = `
                <div class="modal-gallery">
                    ${imgUrl ? `<img src="${imgUrl}" onclick="openLightbox('${imgUrl}')" style="width:100%; height:100%; object-fit:cover; display:block;">` : ''}
                </div>
                <div class="modal-details">
                    <h1 class="modal-title">${nombre}</h1>
                    <p class="card-price" style="font-size:1.6rem;">${precio}</p>
                    <p style="font-size:0.9rem; color:#444; margin-top:15px;">${desc}</p>
                    <a href="https://wa.me/message/XIVP7QDJ5QKIP1" target="_blank" class="btn-wa">Reservar ahora</a>
                </div>
            `;
            document.getElementById('modal-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox-overlay').style.display = 'flex'; }
        function closeLightbox() { document.getElementById('lightbox-overlay').style.display = 'none'; }
        init();
    </script>
</body>
</html>
