<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Colors | Elite Ocean Journeys</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand-blue: #04263a; --accent: #bd5307; --pearl-bg: #f7f5f0; }
        body { background-color: var(--pearl-bg); color: var(--brand-blue); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        
        /* Pantalla Bienvenida */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: transform 0.8s ease, opacity 0.8s ease; }
        #welcome-screen.dismissed { transform: translateY(-100vh); opacity: 0; pointer-events: none; }
        .welcome-btn { background-color: var(--accent); color: #fff; padding: 18px 40px; border-radius: 50px; cursor: pointer; border: none; font-weight: 600; }
        
        /* Interfaz Principal */
        #main-site-wrapper { display: none; padding-bottom: 50px; }
        
        /* Asistente */
        #assistant-section { max-width: 800px; margin: 40px auto; padding: 30px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        select { padding: 10px; width: 100%; border: 1px solid #ccc; border-radius: 6px; }
        .btn-generate { background: var(--brand-blue); color: #fff; padding: 15px; border-radius: 30px; border: none; width: 100%; cursor: pointer; font-weight: 700; }
        .day-block { background: var(--pearl-bg); padding: 15px; margin-top: 10px; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 style="color:white; margin-bottom:20px;">Amazing Colors</h1>
        <button class="welcome-btn" onclick="startExperience()">Comencemos la experiencia</button>
    </div>

    <div id="main-site-wrapper">
        <section id="assistant-section">
            <h2 style="font-family: 'Cinzel'; margin-bottom: 20px;">Tu Asistente Vacacional</h2>
            <div class="form-grid">
                <div><label>Noches</label><select id="nights"></select></div>
                <div><label>Personas</label><select id="people"></select></div>
                <div><label>Presupuesto (MXN)</label><select id="budget"></select></div>
                <div><label>Destino</label><select id="dest"><option value="Cancun">Cancún</option><option value="Playa del Carmen">Playa del Carmen</option><option value="Tulum">Tulum</option></select></div>
            </div>
            <button class="btn-generate" onclick="generateItinerary()">Calcular e Planificar mi Itinerario</button>
            <div id="itinerary-result" style="margin-top: 30px;"></div>
        </section>
    </div>

    <script>
        // Función de inicio corregida
        function startExperience() {
            document.getElementById('welcome-screen').classList.add('dismissed');
            document.getElementById('main-site-wrapper').style.display = 'block';
        }

        // Cargar opciones al abrir la página
        window.addEventListener('DOMContentLoaded', () => {
            const nights = document.getElementById('nights');
            for (let i = 2; i <= 30; i++) nights.innerHTML += `<option value="${i}">${i} Noches</option>`;
            
            const people = document.getElementById('people');
            for (let i = 1; i <= 60; i++) people.innerHTML += `<option value="${i}">${i} Personas</option>`;
            
            const budget = document.getElementById('budget');
            for (let i = 2000; i <= 99000; i += 5000) budget.innerHTML += `<option value="${i}">$${i.toLocaleString()} MXN</option>`;
        });

        function generateItinerary() {
            const nights = document.getElementById('nights').value;
            const dest = document.getElementById('dest').value;
            const budget = document.getElementById('budget').value;
            
            // Verificación para evitar NaN
            if(!nights || !budget) { alert("Por favor selecciona todos los campos"); return; }

            document.getElementById('itinerary-result').innerHTML = `
                <div class="day-block">
                    <h4>Itinerario para ${nights} noches en ${dest}</h4>
                    <p>Calculando presupuesto restante de $${parseInt(budget).toLocaleString()} MXN...</p>
                    <p>Estamos procesando las mejores experiencias curadas para ti.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
