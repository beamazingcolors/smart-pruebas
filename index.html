<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Amazing Colors | Itinerario Premium</title>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f7f5f0; padding: 20px; }
        .assistant-container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        select, .btn-generate { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
        .btn-generate { background: #04263a; color: white; cursor: pointer; font-weight: bold; border: none; margin-top: 20px; }
        .day-block { background: #fff; padding: 20px; margin-top: 15px; border-left: 5px solid #bd5307; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="assistant-container">
    <h2>Diseñador de Itinerarios</h2>
    <div class="form-grid">
        <select id="nights"></select>
        <select id="people"></select>
        <select id="budget"></select>
        <select id="dest"><option value="Cancun">Cancún</option><option value="Playa del Carmen">Playa del Carmen</option><option value="Tulum">Tulum</option></select>
    </div>
    <button class="btn-generate" onclick="generateItinerary()">PLANIFICAR MI ITINERARIO</button>
    <div id="itinerary-result" style="margin-top:20px;"></div>
</div>

<script>
    const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9f5_81pPWsXVaJ5uKaifOyjpmSprGKAzEkGh7qMSd5R83cV8UCJeqldoZIb5l3sN8kDEbFoC2NY0s/pub?output=tsv';
    let fullData = [];

    // Inicializar Selectores
    window.onload = () => {
        for(let i=2; i<=30; i++) document.getElementById('nights').innerHTML += `<option value="${i}">${i} Noches</option>`;
        for(let i=1; i<=60; i++) document.getElementById('people').innerHTML += `<option value="${i}">${i} Personas</option>`;
        for(let i=2000; i<=99000; i+=5000) document.getElementById('budget').innerHTML += `<option value="${i}">$${i.toLocaleString()} MXN</option>`;
        
        // Cargar datos automáticamente al abrir
        init();
    };

    async function init() {
        try {
            const resp = await fetch(TSV_URL);
            const text = await resp.text();
            const rows = text.split('\n').map(r => r.split('\t'));
            const headers = rows[0].map(h => h.trim());
            fullData = rows.slice(1).map(row => {
                let obj = {}; headers.forEach((h, i) => obj[h.trim()] = row[i]?.trim()); return obj;
            });
            console.log("Datos cargados correctamente:", fullData.length, "ítems encontrados.");
        } catch(e) { console.error("Error al cargar TSV:", e); }
    }

    function generateItinerary() {
        console.log("Botón presionado");
        const res = document.getElementById('itinerary-result');
        const budget = parseInt(document.getElementById('budget').value);
        const nights = parseInt(document.getElementById('nights').value);
        const dest = document.getElementById('dest').value;

        if (fullData.length === 0) {
            res.innerHTML = "<p style='color:red;'>Error: Los datos no han cargado. Revisa tu conexión a internet o el archivo.</p>";
            return;
        }

        // Filtro básico
        const yate = fullData.find(i => i.Tipo?.toLowerCase().includes('yate'));
        const tours = fullData.filter(i => i.Tipo?.toLowerCase().includes('tour'));

        let html = `<h3>Itinerario en ${dest}</h3>`;
        for(let i=1; i<=nights; i++) {
            const act = (i === 1 && yate) ? yate : tours[(i-1) % (tours.length || 1)];
            const nombre = act ? (act.Nombre || act.nombre || "Tour Disponibilidad") : "Tour a determinar";
            html += `<div class="day-block"><strong>Día ${i}:</strong> ${nombre}</div>`;
        }
        res.innerHTML = html;
        console.log("Itinerario generado");
    }
</script>
</body>
</html>
