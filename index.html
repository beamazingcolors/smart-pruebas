<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Colors | Elite Ocean Journeys</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand-blue: #04263a; --accent: #bd5307; --white: #ffffff; --pearl-bg: #f7f5f0; }
        body { background-color: var(--pearl-bg); color: var(--brand-blue); font-family: 'Montserrat', sans-serif; line-height: 1.6; }
        
        .nav-bar { background: #fff; padding: 20px; display: flex; justify-content: center; gap: 20px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ddd; }
        .nav-btn { background: none; border: none; cursor: pointer; font-weight: 600; text-transform: uppercase; padding: 5px 10px; }
        .nav-btn.active { border-bottom: 2px solid var(--accent); color: var(--accent); }
        
        #assistant-section { max-width: 900px; margin: 40px auto; padding: 30px; background: #fff; border-radius: 12px; display: none; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .btn-generate { background: var(--brand-blue); color: #fff; padding: 15px; border-radius: 30px; border: none; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: 700; margin-top: 20px; }
        
        .day-block { background: var(--pearl-bg); padding: 20px; margin-top: 20px; border-left: 4px solid var(--accent); }
        .venue-list { list-style: none; margin-top: 10px; }
        .venue-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .map-link { color: var(--accent); font-weight: 600; display: block; margin-top: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="main-site-wrapper">
        <nav class="nav-bar">
            <button class="nav-btn active" id="btnTour" onclick="showCatalog()">Catálogo Curado</button>
            <button class="nav-btn" id="btnAssistant" onclick="toggleAssistant()">Asistente Vacacional</button>
        </nav>

        <main id="catalog-grid" style="display: grid; padding: 40px; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));"></main>

        <section id="assistant-section">
            <h2 style="font-family: 'Cinzel'; margin-bottom: 20px;">Diseñador de Itinerarios Premium</h2>
            <div class="form-grid">
                <div><label>Noches</label><select id="nights"></select></div>
                <div><label>Personas</label><select id="people"></select></div>
                <div><label>Presupuesto (MXN)</label><select id="budget"></select></div>
                <div><label>Destino</label><select id="dest"><option value="Cancun">Cancún</option><option value="Playa del Carmen">Playa del Carmen</option><option value="Tulum">Tulum</option></select></div>
            </div>
            <button class="btn-generate" onclick="generateItinerary()">Crear mi Experiencia</button>
            <div id="itinerary-result" style="margin-top: 30px;"></div>
        </section>
    </div>

    <script>
        const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9f5_81pPWsXVaJ5uKaifOyjpmSprGKAzEkGh7qMSd5R83cV8UCJeqldoZIb5l3sN8kDEbFoC2NY0s/pub?gid=451869619&single=true&output=tsv';
        let fullData = [];

        // Curaduría de Recomendaciones (Inspirado en los mejores sitios de la Riviera Maya)
        const recommendations = {
            "Cancun": {
                restaurants: [
                    { name: "Porfirio's Cancún", map: "https://maps.app.goo.gl/..." },
                    { name: "Harry's Steakhouse", map: "https://maps.app.goo.gl/..." },
                    { name: "Nicoletta", map: "https://maps.app.goo.gl/..." }
                ],
                cafes: [{ name: "Café des Artistes", map: "https://maps.app.goo.gl/..." }]
            },
            "Playa del Carmen": {
                restaurants: [
                    { name: "La Cueva del Chango", map: "https://maps.app.goo.gl/..." },
                    { name: "Oh Lala!", map: "https://maps.app.goo.gl/..." },
                    { name: "El Fogón", map: "https://maps.app.goo.gl/..." }
                ],
                cafes: [{ name: "Chez Céline", map: "https://maps.app.goo.gl/..." }]
            },
            "Tulum": {
                restaurants: [
                    { name: "Hartwood", map: "https://maps.app.goo.gl/..." },
                    { name: "Ilios Greek Estiatorio", map: "https://maps.app.goo.gl/..." },
                    { name: "Posada Margherita", map: "https://maps.app.goo.gl/..." }
                ],
                cafes: [{ name: "Matcha Mama", map: "https://maps.app.goo.gl/..." }]
            }
        };

        async function init() {
            const response = await fetch(TSV_URL);
            const text = await response.text();
            const rows = text.split('\n').map(r => r.split('\t'));
            const headers = rows[0].map(h => h.trim());
            fullData = rows.slice(1).map(row => {
                let item = {}; headers.forEach((h, i) => { item[h] = row[i]?.trim(); }); return item;
            });
            showCatalog();
        }

        // Mostrar Catálogo Curado: 1 Yate + Resto Tours
        function showCatalog() {
            document.getElementById('catalog-grid').style.display = 'grid';
            document.getElementById('assistant-section').style.display = 'none';
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = '';
            
            const yacht = fullData.find(i => i['Tipo']?.toLowerCase().includes('yate'));
            const tours = fullData.filter(i => i['Tipo']?.toLowerCase().includes('tour'));
            
            const displayList = [yacht, ...tours].filter(Boolean);
            displayList.forEach(item => {
                grid.innerHTML += `<div class="day-block"><h4>${item['Nombre']}</h4><p>${item['Precio']}</p></div>`;
            });
        }

        function toggleAssistant() {
            document.getElementById('catalog-grid').style.display = 'none';
            document.getElementById('assistant-section').style.display = 'block';
        }

        // Lógica de Itinerario con Múltiples Opciones
        function generateItinerary() {
            const maxBudget = parseInt(document.getElementById('budget').value);
            const nights = parseInt(document.getElementById('nights').value);
            const dest = document.getElementById('dest').value;
            const res = document.getElementById('itinerary-result');
            
            // Selección: 1 Yate + Tours
            const yate = fullData.find(i => i['Tipo']?.toLowerCase().includes('yate'));
            const tours = fullData.filter(i => i['Tipo']?.toLowerCase().includes('tour') && parseInt((i['Precio']||'0').replace(/\D/g,'')) <= maxBudget);

            let html = `<h3>Tu Itinerario en ${dest}</h3>`;
            for (let i = 1; i <= nights; i++) {
                if (i % 2 !== 0) {
                    const activity = (i === 1 && yate) ? yate : (tours[(i-1) % tours.length] || tours[0]);
                    html += `<div class="day-block"><h4>Día ${i}: Experiencia</h4><p>${activity ? activity['Nombre'] : "Tour Privado"}</p></div>`;
                } else {
                    const v = recommendations[dest];
                    html += `<div class="day-block"><h4>Día ${i}: Descanso & Gastronomía</h4>
                        <ul class="venue-list">
                            ${v.restaurants.map(r => `<li class="venue-item">${r.name}<a href="${r.map}" target="_blank" class="map-link">📍 Ver en Maps</a></li>`).join('')}
                        </ul></div>`;
                }
            }
            res.innerHTML = html;
        }

        // Inicializadores de selectores...
        const nightsSelect = document.getElementById('nights');
        for (let i = 2; i <= 30; i++) nightsSelect.innerHTML += `<option value="${i}">${i} Noches</option>`;
        const peopleSelect = document.getElementById('people');
        for (let i = 1; i <= 60; i++) peopleSelect.innerHTML += `<option value="${i}">${i} Personas</option>`;
        const budgetSelect = document.getElementById('budget');
        for (let i = 2000; i <= 99000; i += 5000) budgetSelect.innerHTML += `<option value="${i}">Hasta $${i.toLocaleString()} MXN</option>`;

        init();
    </script>
</body>
</html>
