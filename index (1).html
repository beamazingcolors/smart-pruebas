<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Colors | Elite Ocean Journeys</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-dark: #000000; --brand-blue: #04263a; --accent: #bd5307; --light: #0cb5d6; --white: #ffffff; --pearl-bg: #f7f5f0; --gradient: linear-gradient(135deg, #f5841a 0%, #ffb347 100%); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--primary-dark); color: var(--white); font-family: 'Montserrat', sans-serif; line-height: 1.6; }
        
        #main-site-wrapper { background-color: var(--pearl-bg); color: var(--brand-blue); min-height: 100vh; padding-bottom: 50px; }
        .nav-bar { background: rgba(247, 245, 240, 0.96); padding: 20px; display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid rgba(4, 38, 58, 0.08); position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: none; border: none; color: var(--brand-blue); text-transform: uppercase; cursor: pointer; font-weight: 600; padding: 5px 10px; }
        .nav-btn.active { border-bottom: 2px solid var(--accent); color: var(--accent); }
        
        /* Asistente */
        #assistant-section { max-width: 900px; margin: 40px auto; padding: 30px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: none; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; }
        .btn-generate { background: var(--brand-blue); color: #fff; padding: 15px; border-radius: 30px; border: none; cursor: pointer; width: 100%; text-transform: uppercase; font-weight: 700; }
        
        .day-block { background: var(--pearl-bg); padding: 20px; margin-top: 15px; border-left: 4px solid var(--accent); border-radius: 0 8px 8px 0; }
        .map-link { color: var(--light); font-weight: 600; display: block; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="main-site-wrapper">
        <nav class="nav-bar">
            <button class="nav-btn active" onclick="showCatalog()">Experiencias</button>
            <button class="nav-btn" onclick="showAssistant()">Asistente Vacacional</button>
        </nav>

        <main id="catalog-grid" style="display: grid; padding: 40px; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">
            <!-- El catálogo se carga aquí -->
        </main>

        <section id="assistant-section">
            <h2 style="font-family: 'Cinzel'; margin-bottom: 20px;">Tu Asistente Vacacional</h2>
            <div class="form-grid">
                <div><label>Noches</label><select id="nights"></select></div>
                <div><label>Personas</label><select id="people"></select></div>
                <div><label>Presupuesto (MXN)</label><select id="budget"></select></div>
                <div><label>Destino</label><select id="dest"><option value="Cancun">Cancún</option><option value="Playa del Carmen">Playa del Carmen</option><option value="Tulum">Tulum</option></select></div>
            </div>
            <button class="btn-generate" onclick="generateItinerary()">Planificar mi Itinerario</button>
            <div id="itinerary-result" style="margin-top: 30px;"></div>
        </section>
    </div>

    <script>
        // Configuración inicial de selectores
        const nightsSelect = document.getElementById('nights');
        for (let i = 2; i <= 30; i++) nightsSelect.innerHTML += `<option value="${i}">${i} Noches</option>`;
        
        const peopleSelect = document.getElementById('people');
        for (let i = 1; i <= 60; i++) peopleSelect.innerHTML += `<option value="${i}">${i} Personas</option>`;
        
        const budgetSelect = document.getElementById('budget');
        for (let i = 2000; i <= 99000; i += 5000) budgetSelect.innerHTML += `<option value="${i}">Hasta $${i.toLocaleString()} MXN</option>`;

        const googleVenues = {
            "Cancun": { rest: "Porfirio's Cancún", cafe: "Café de Organico", map: "https://www.google.com/maps/search/?api=1&query=Porfirios+Cancun" },
            "Playa del Carmen": { rest: "La Cueva del Chango", cafe: "Chez Céline", map: "https://www.google.com/maps/search/?api=1&query=La+Cueva+del+Chango" },
            "Tulum": { rest: "Ilios Greek Estiatorio", cafe: "Matcha Mama", map: "https://www.google.com/maps/search/?api=1&query=Ilios+Tulum" }
        };

        // Función para limpiar precios (ej: "$10,000" -> 10000)
        function cleanPrice(val) { return parseInt(val.replace(/[^0-9]/g, '')) || 0; }

        function showAssistant() {
            document.getElementById('catalog-grid').style.display = 'none';
            document.getElementById('assistant-section').style.display = 'block';
        }

        function showCatalog() {
            document.getElementById('catalog-grid').style.display = 'grid';
            document.getElementById('assistant-section').style.display = 'none';
        }

        async function generateItinerary() {
            const dest = document.getElementById('dest').value;
            const nights = parseInt(document.getElementById('nights').value);
            const maxBudget = parseInt(document.getElementById('budget').value);

    </script>
</body>
</html>
